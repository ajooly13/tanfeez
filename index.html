<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1a2b">
<title>قسم التنفيذ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#0c1522; --card:#152439; --card2:#1c3050; --gold:#c9a24b; --gold2:#e2c37a;
  --txt:#eef2f7; --muted:#8fa3bd; --green:#3ecf8e; --red:#ef6b6b; --line:#263b5c;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{margin:0; font-family:'Segoe UI',Tahoma,Arial,sans-serif; background:
  radial-gradient(1200px 600px at 85% -10%, #1a2c47 0%, transparent 60%),
  radial-gradient(900px 500px at 0% 110%, #14233a 0%, transparent 55%), var(--bg);
  color:var(--txt); min-height:100vh}
.layout{display:flex; min-height:100vh}
/* ============ Sidebar ============ */
.sidebar{width:255px; flex-shrink:0; background:linear-gradient(180deg,#12203630,#0c162650), #101d31; border-left:1px solid var(--line); padding:22px 14px; position:sticky; top:0; height:100vh; overflow-y:auto}
.sb-brand{display:flex; align-items:center; gap:10px; padding:0 6px 18px; border-bottom:1px solid var(--line); margin-bottom:16px}
.sb-brand .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--gold),#8a6a24);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 14px #c9a24b40}
.sb-brand b{color:var(--gold2); font-size:17px; display:block}
.sb-brand small{color:var(--muted); font-size:11px}
.sb-item{display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:10px; cursor:pointer; color:var(--muted); font-size:14px; margin-bottom:4px; border:1px solid transparent; transition:.2s}
.sb-item:hover{background:var(--card); color:var(--txt); transform:translateX(-3px)}
.sb-item.on{background:var(--card2); color:var(--gold2); border-color:var(--line); font-weight:bold}
.sb-item .n{background:var(--card); border-radius:999px; padding:1px 9px; font-size:11px; margin-right:auto; color:var(--muted)}
.sb-item.sub{padding-right:28px; font-size:13px}
.sb-sep{height:1px; background:var(--line); margin:12px 4px}
.app{flex:1; max-width:1150px; margin:0 auto; padding:26px 34px 90px; width:100%}
@media(max-width:900px){ .sidebar{display:none} .app{padding:14px 14px 90px} }
/* ============ Animations ============ */
@keyframes fadeUp{from{opacity:0; transform:translateY(18px)}to{opacity:1; transform:none}}
@keyframes popIn{0%{opacity:0; transform:scale(.92)}100%{opacity:1; transform:scale(1)}}
@keyframes shimmer{0%{background-position:-500px 0}100%{background-position:500px 0}}
.page{animation:fadeUp .4s ease both}
.stagger>*{animation:popIn .45s ease both}
.stagger>*:nth-child(1){animation-delay:.03s}.stagger>*:nth-child(2){animation-delay:.09s}
.stagger>*:nth-child(3){animation-delay:.15s}.stagger>*:nth-child(4){animation-delay:.21s}
.stagger>*:nth-child(5){animation-delay:.27s}.stagger>*:nth-child(6){animation-delay:.33s}
/* ============ Hero ============ */
.hero{text-align:center; padding:34px 10px 26px}
.hero .big{font-size:44px}
.hero h1{font-size:34px; margin:10px 0 6px; background:linear-gradient(90deg,var(--gold2),#fff6dd,var(--gold2)); -webkit-background-clip:text; background-clip:text; color:transparent; background-size:1000px; animation:shimmer 6s linear infinite}
.hero p{color:var(--muted); margin:0; font-size:14px}
/* ============ Cards ============ */
.grid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px}
@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}}
.big-card{background:linear-gradient(160deg,var(--card),var(--card2)); border:1px solid var(--line); border-radius:18px; padding:28px 16px; cursor:pointer; text-align:center; transition:.22s; position:relative; overflow:hidden}
.big-card::after{content:""; position:absolute; inset:0; background:linear-gradient(120deg,transparent 30%,#ffffff0d 50%,transparent 70%); transform:translateX(-100%); transition:.5s}
.big-card:hover{border-color:var(--gold); transform:translateY(-4px); box-shadow:0 10px 30px #00000055}
.big-card:hover::after{transform:translateX(100%)}
.big-card:active{transform:scale(.97)}
.big-card .ic{font-size:44px; margin-bottom:10px}
.big-card .nm{font-size:17px; font-weight:bold}
.big-card .cnt{font-size:12px; color:var(--muted); margin-top:6px}
.big-card.full{grid-column:1/-1}
.big-card.gold{background:linear-gradient(135deg,#3a2f14,#1c3050); border-color:var(--gold)}
.badge{position:absolute; top:12px; left:12px; background:var(--gold); color:#1a1405; border-radius:999px; padding:2px 10px; font-size:12px; font-weight:bold}
/* ============ Common ============ */
.crumb{display:flex; align-items:center; gap:10px; margin:0 0 18px; font-size:14px; color:var(--muted); flex-wrap:wrap}
.back-btn{background:var(--card); border:1px solid var(--line); color:var(--gold2); border-radius:10px; padding:8px 16px; font-size:14px; cursor:pointer; font-weight:bold; transition:.2s}
.back-btn:hover{border-color:var(--gold); transform:translateX(3px)}
.list-item{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:10px; cursor:pointer; transition:.2s}
.list-item:hover{background:var(--card2); border-color:var(--gold); transform:translateX(-4px)}
.li-top{display:flex; justify-content:space-between; align-items:center; gap:8px}
.li-title{font-weight:bold; font-size:15px}
.li-sub{font-size:12px; color:var(--muted); margin-top:6px; display:flex; gap:12px; flex-wrap:wrap}
.pill{display:inline-block; border-radius:999px; padding:3px 11px; font-size:11px; font-weight:bold}
.st-new{background:#1f3a5a;color:#7dbcff}.st-run{background:#173a2c;color:#5fe0a5}
.st-done{background:#26313f;color:#9fb2c8}
.btn{display:block; width:100%; background:linear-gradient(135deg,var(--gold),#a37f2e); color:#1a1405; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:bold; cursor:pointer; margin-top:12px; font-family:inherit; transition:.2s}
.btn:hover{filter:brightness(1.12); box-shadow:0 6px 18px #c9a24b30}
.btn.sec{background:var(--card); color:var(--gold2); border:1px solid var(--gold)}
.btn.ghost{background:transparent; color:var(--muted); border:1px dashed var(--line)}
.btn.danger{background:transparent; color:var(--red); border:1px solid var(--red)}
.btn-row{display:flex; gap:10px; flex-wrap:wrap}
.btn-row .btn{flex:1; min-width:180px}
label{display:block; font-size:13px; color:var(--muted); margin:12px 0 5px}
input,select,textarea{width:100%; background:#0f1d31; border:1px solid var(--line); color:var(--txt); border-radius:10px; padding:11px 12px; font-size:15px; font-family:inherit; transition:.2s}
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--gold); box-shadow:0 0 0 3px #c9a24b22}
textarea{min-height:90px; resize:vertical; line-height:1.9}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.row3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px}
.row4{display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px}
@media(max-width:700px){.row3,.row4{grid-template-columns:1fr 1fr}}
.section-title{font-size:15px; color:var(--gold2); font-weight:bold; margin:22px 0 6px; display:flex; align-items:center; gap:8px}
.section-title::after{content:""; flex:1; height:1px; background:var(--line)}
.card-box{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:14px}
.muted{color:var(--muted); font-size:13px; line-height:1.9}
.empty{text-align:center; color:var(--muted); padding:44px 10px; font-size:14px; line-height:2.2}
.empty .ic{font-size:46px}
.sub-card{background:#0f1d31; border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px; position:relative; animation:popIn .3s ease both}
.sub-card .rm{position:absolute; top:8px; left:10px; color:var(--red); cursor:pointer; font-size:13px; font-weight:bold}
.kv{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--line); font-size:14px; gap:10px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--muted); flex-shrink:0}
.kv .v{font-weight:bold; text-align:left}
.total-bar{background:linear-gradient(135deg,#243b17,#152439); border:1px solid var(--green); border-radius:12px; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; margin-top:10px; font-weight:bold}
.follow-item{border-right:3px solid var(--gold); background:#0f1d31; border-radius:8px; padding:10px 12px; margin-bottom:8px}
.follow-item .d{font-size:11px; color:var(--gold2); margin-bottom:3px}
.del-x{color:var(--red); cursor:pointer; font-size:13px; float:left}
.search{margin-bottom:12px}
#toast{position:fixed; bottom:24px; right:50%; transform:translateX(50%); background:var(--gold); color:#1a1405; padding:12px 26px; border-radius:999px; font-weight:bold; font-size:14px; display:none; z-index:99; box-shadow:0 8px 24px #00000070; animation:popIn .25s ease}
header.m{display:none}
@media(max-width:900px){
  header.m{display:flex; align-items:center; gap:10px; padding:8px 2px 14px}
  header.m .logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--gold),#8a6a24);display:flex;align-items:center;justify-content:center;font-size:21px}
  header.m h1{font-size:18px; margin:0; color:var(--gold2)}
  header.m p{margin:0; font-size:11px; color:var(--muted)}
}
</style>
</head>
<body>
<div class="layout">
<nav class="sidebar" id="sidebar"></nav>
<div class="app" id="app"></div>
</div>
<div id="toast"></div>

<script>
/* ==================== التخزين ==================== */
const DB_KEY='tanfeez_v2';
let db=load();
function load(){
  try{ const d=JSON.parse(localStorage.getItem(DB_KEY)); if(d&&d.records) return d; }catch(e){}
  // شركة البنك الإسلامي العربي جاهزة من نماذج المكتب
  return { seq:2, records:[], settings:{lawyer:''}, companies:[{
    id:'c1',
    name:'شركة البنك الإسلامي العربي المساهمة العامة المحدودة',
    reg:'563201011',
    address:'رام الله – الماصيون',
    wakilName:'مهند سعيد محمود عساف',
    wakalaNo:'3455/2011',
    notary:'رام الله',
    wakalaDate:'07/03/2011',
    lawyers:'أشرف الفار و/أو نضال فريج و/أو نداء حليسي و/أو فاروق طباخي و/أو جواد مخلوف و/أو عمرو أبو فرحة و/أو ابراهيم خضر و/أو مصطفى طه و/أو أيهم عزام و/أو جيهان حسين'
  }]};
}
function save(){
  try{ localStorage.setItem(DB_KEY, JSON.stringify(db)); }
  catch(e){ alert('⚠️ التخزين مش شغال هون!\nافتح الملف بمتصفح كروم أو إيدج من سطح المكتب عشان تنحفظ معاملاتك.'); }
}
(function(){ try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); }
  catch(e){ setTimeout(()=>alert('⚠️ تنبيه: هالشاشة ما بتحفظ البيانات.\nافتح الملف بمتصفح كروم أو إيدج العادي عشان يشتغل الحفظ.'),600); } })();
function uid(){ return 'r'+(db.seq++); }
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const today=()=>new Date().toISOString().slice(0,10);
const YEAR=new Date().getFullYear();
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
const fmtNum=n=>{ n=Number(String(n).replace(/[,\s]/g,'')); return isNaN(n)?'':n.toLocaleString('en-US'); };
const numVal=n=>Number(String(n||'').replace(/[,\s]/g,''))||0;

/* ==================== الأنواع ==================== */
const TYPES={
  chk:{name:'الشيكات', one:'شيكات', ic:'🧾'},
  kmb:{name:'الكمبيالات', one:'كمبيالات', ic:'📜'},
  hkm:{name:'تنفيذ الأحكام', one:'تنفيذ أحكام', ic:'⚖️'}
};
const STATUSES=[['new','جديد','st-new'],['run','قيد المتابعة','st-run'],['done','منجز','st-done']];
const stName=c=>(STATUSES.find(x=>x[0]===c)||STATUSES[0])[1];
const stCls=c=>(STATUSES.find(x=>x[0]===c)||STATUSES[0])[2];
const CURR=['شيكل','دينار','دولار'];

/* ==================== التفقيط (المبلغ كتابةً) ==================== */
const T_ONES=['','واحد','اثنان','ثلاثة','أربعة','خمسة','ستة','سبعة','ثمانية','تسعة','عشرة','أحد عشر','اثنا عشر','ثلاثة عشر','أربعة عشر','خمسة عشر','ستة عشر','سبعة عشر','ثمانية عشر','تسعة عشر'];
const T_TENS=['','عشرة','عشرون','ثلاثون','أربعون','خمسون','ستون','سبعون','ثمانون','تسعون'];
const T_HUND=['','مئة','مئتان','ثلاثمئة','أربعمئة','خمسمئة','ستمئة','سبعمئة','ثمانمئة','تسعمئة'];
function tf99(n){ if(n<20) return T_ONES[n]; const u=n%10,t=Math.floor(n/10); return u? T_ONES[u]+' و'+T_TENS[t] : T_TENS[t]; }
function tf999(n){ const h=Math.floor(n/100), r=n%100, p=[]; if(h)p.push(T_HUND[h]); if(r)p.push(tf99(r)); return p.join(' و'); }
function tafqit(n){
  n=Math.floor(Math.abs(n)); if(!n) return 'صفر';
  const parts=[];
  const mil=Math.floor(n/1000000); const th=Math.floor((n%1000000)/1000); const rest=n%1000;
  if(mil){ parts.push(mil===1?'مليون': mil===2?'مليونان': mil<=10? tf999(mil)+' ملايين' : tf999(mil)+' مليون'); }
  if(th){ parts.push(th===1?'ألف': th===2?'ألفان': th<=10? tf999(th)+' آلاف' : tf999(th)+' ألف'); }
  if(rest){ parts.push(tf999(rest)); }
  return parts.join(' و');
}
const tafqitCurr=(n,curr)=> tafqit(n)+' '+curr;

/* ==================== قواعد اللغة حسب عدد المحكوم عليهم ==================== */
function gram(debtors){
  const n=debtors.length, f=n===1&&debtors[0].g==='f';
  return {
    alih: n===1? (f?'المحكوم عليها':'المحكوم عليه') : n===2? 'المحكوم عليهما' : 'المحكوم عليهم',
    ilaih: n===1? (f?'إلى المحكوم عليها':'إلى المحكوم عليه') : n===2? 'إلى المحكوم عليهما' : 'إلى المحكوم عليهم',
    mutalaba: n===1? (f?'لمطالبتها':'لمطالبته') : n===2? 'لمطالبتهما' : 'لمطالبتهم',
    tadamon: n===2? '"بالتضامن والتكافل فيما بينهما"' : n>2? '"بالتضامن والتكافل فيما بينهم"' : ''
  };
}
const holder=d=> d.g==='f'?'حاملة هوية رقم':'حامل هوية رقم';
const addrWord=d=> d.g==='f'?'عنوانها':'عنوانه';

/* ==================== نصوص ثابتة من نماذج المكتب ==================== */
const WAKALA_BOILER='وإجمالاً فقد وكلتهم في تقديم الطلبات/الاستدعاءات/المطالبات/الاستشكالات الناشئة و/أو التي قد تنشأ عن هذه القضية وفي طلب استصدار قرارات الحجز/الحبس، وفي طلب إيقاع الحجوزات بكافة أشكالها وأنواعها على الأموال المنقولة وغير المنقولة وفي تمثيل الشركة أمام دائرة/دوائر التنفيذ المختصة وفي التوقيع نيابة عنها أمام دائرة/دوائر التنفيذ و/أو دوائر الشرطة و/أو أية جهة مختصة رسمية وغير رسمية أخرى وفي قبض المبالغ وإجراء المصالحة وتوقيع التسويات والمخالصة النهائية والإبراء النهائي، والمطالبة بالرسوم والمصاريف وأتعاب المحاماة وفي تمثيل الشركة أمام جميع المحاكم بكافة أنواعها ودرجاتها وذلك لغايات تحصيل حقوقها وحتى اخر إجراء قانوني بهذا الخصوص وفي كل ما هو منصوص عليه بموجب وكالتي العامة المذكورة أعلاه وفي حضور جلسات الاقتدار والاستشكالات وفي المخاصمة والمدافعة والمرافعة لاخر درجة من درجات المحاكمة صلحاً وبداية واستئنافاً وتمييزاً ولدى محكمة العدل العليا وفي إمضاء وتقديم وتبلغ وتبليغ جميع الأوراق والاستدعاءات واللوائح والاخطارات والمذكرات والتحارير والدعاوى وإعلام الحكم والاعتراض وطلب الحجزين التحفظي والإجرائي وفكهما وتثبيتهما وفي انتخاب أهل الخبرة والمحكمين والمميزين وقبول أو رد تقاريرهم والموافقة أو الاعتراض على أي تقرير صدر أو سيصدر ضد مصلحتنا وفي المصالحة وإمضائها والإقرار بالحق والإبراء منه والتنازل عنه وإجراء المحاسبة وتعيين المحاسبين وفي التحكيم وطلب تصديق قرار المحكمين لدى المحكمة وفي الكشف والتدقيق والتطبيق والاستكساب وإنكار الخطوط والإمضاءات والأختام والبصمات والطعن فيها أو الاعتراف بها وفي تقديم البينات وطلبها وسماعها وحصرها والعجز عنها وفي طلب الدخول بصفة شخص ثالث أو أشخاص ثالثة وطلب إدخال الغير وفي الادعاء بالتقابل، كذلك في تقديم أو سحب المستندات واستخراج النسخ وفي رد القضاة. وتعيين قيم وتوجيه الإنذارات والإخطارات بما فيها توجيه الإنذارات بواسطة دائرة تسجيل الأراضي ونقل الدعوى وتوقيفها وإسقاطها وفي توجيه اليمين الحاسمة وردها والنكول عنها. وفي تنفيذ الحكم أو القرار الذي يصدر لصالحنا لدى دائرة الإجراء/التنفيذ أو أية دائرة تقوم مقامها والقيام بجميع المعاملات الإجرائية/التنفيذية وقبض المبالغ التي تحصل من المحكوم عليه رأساً أو من دائرة الإجراء/التنفيذ والودائ const compLine=c=> `${c.name} المسجلة لدى مسجل الشركات في وزارة الاقتصاد الوطني تحت الرقم (${c.reg})/ ${c.address}.`;

function debtorLinesHTML(debtors, withAddr){
  return debtors.map((d,i)=>{
    let s=`<p class="j"><b>${i+1}.</b> ${esc(d.name)}، ${holder(d)} (${esc(d.id)}).`;
    if(withAddr && d.addr) s+=`<br>${addrWord(d)} لغايات التبليغ: ${esc(d.addr)}${d.phone? '، هاتف رقم ('+esc(d.phone)+')':''}.`;
    return s+'</p>';
  }).join('');
}

function mahkoumBihHTML(r){
  const curr=r.curr||'شيكل';
  if(r.type==='chk'){
    const n=r.rows.length, total=r.rows.reduce((a,x)=>a+numVal(x.amount),0);
    const words=r.totalWords||tafqitCurr(total,curr);
    const chkWord= n>1? `الشيكات عدد (${n}) المحررة لأمر الشركة والواردة تفاصيلها` : `الشيك عدد (1) المحرر لأمر الشركة والوارد تفاصيله`;
    return `<p class="j"><b>المحكوم به:</b> مبلغ (${fmtNum(total)}) ${esc(words)} بموجب ${chkWord} في الجدول المبين أدناه:</p>`
      + tableHTML(['رقم الشيك','تاريخ الاستحقاق','مبلغ الشيك','البنك المسحوب عليه'],
          r.rows.map(x=>[esc(x.no), esc(x.due), `(${fmtNum(x.amount)}) ${curr}`, esc(x.bank)]));
  }
  if(r.type==='kmb'){
    const n=r.rows.length;
    const claimed=numVal(r.claimed), orig=numVal(r.orig||r.claimed);
    const cw=r.claimedWords||tafqitCurr(claimed,curr), ow=r.origWords||tafqitCurr(orig,curr);
    const kmbWord= n>1? `الكمبيالات عدد (${n}) المحررة لأمر الشركة والواردة تفاصيلها` : `الكمبيالة عدد (1) المحررة لأمر الشركة والواردة تفاصيلها`;
    const head= (orig && orig!==claimed)
      ? `مبلغ (${fmtNum(claimed)}) ${esc(cw)}، وذلك من أصل الكمبيالة البالغ قيمتها (${fmtNum(orig)}) ${esc(ow)}، وذلك بموجب ${kmbWord}`
      : `مبلغ (${fmtNum(claimed)}) ${esc(cw)}، وذلك بموجب ${kmbWord}`;
    return `<p class="j"><b>المحكوم به:</b> ${head} في الجدول المبين أدناه:</p>`
      + tableHTML(['قيمة الكمبيالة','تاريخ التحرير','تاريخ الاستحقاق'],
          r.rows.map(x=>[`(${fmtNum(x.amount)}) ${curr}`, esc(x.writeDate), esc(x.due)]));
  }
  // أحكام
  const amt=numVal(r.claimed), w=r.claimedWords||tafqitCurr(amt,curr);
  return `<p class="j"><b>المحكوم به:</b> مبلغ (${fmtNum(amt)}) ${esc(w)}، وذلك بموجب الحكم الصادر عن محكمة ${esc(r.court||'................')} في الدعوى رقم (${esc(r.caseNo||'........')}) بتاريخ ${esc(r.judgDate||'    /    /    ')} والمكتسب الدرجة القطعية.</p>`
    + `<p class="j">${esc(r.judgNotes||'')}</p>`;
}

function tableHTML(headers,rows){
  return `<table dir="rtl" style="width:100%;border-collapse:collapse;margin:8pt 0" border="1" cellpadding="6">
  <tr>${headers.map(h=>`<td style="background:#f2f2f2;text-align:center;font-weight:bold">${h}</td>`).join('')}</tr>
  ${rows.map(row=>`<tr>${row.map(cell=>`<td style="text-align:center">${cell}</td>`).join('')}</tr>`).join('')}
  </table>`;
}

function sanadWord(r){
  if(r.type==='chk') return r.rows.length>1? 'الشيكات المبينة أعلاه':'الشيك المبين أعلاه';
  if(r.type==='kmb') return r.rows.length>1? 'إعلام الكمبيالات المبينة أعلاه':'إعلام الكمبيالة المبينة أعلاه';
  return 'الحكم المبين أعلاه';
}

function buildWakala(r){

  const g=gram(r.debtors);
  const total = r.type==='chk'? r.rows.reduce((a,x)=>a+numVal(x.amount),0) : numVal(r.claimed);
  const curr=r.curr||'شيكل';

function downloadDoc(filename, html){
  const blob=new Blob(['﻿', html], {type:'application/msword;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),3000);
}
function printHtml(html){
  const w=window.open('','_blank');
  w.document.write(html); w.document.close();
  setTimeout(()=>{w.focus(); w.print();},400);
}
function prMahdar(id){ printHtml(buildMahdar(rec(id))); }
function prWakala(id){ printHtml(buildWakala(rec(id))); }

function b64ToU8(b64){
  const bin=atob(b64), u8=new Uint8Array(bin.length);

function replaceInPara(p, from, to){
  normalizePara(p);
  [...p.getElementsByTagNameNS(WNS,'t')].forEach(t=>{ t.textContent=t.textContent.split(from).join(to); });
}
function donorRun(p, bold){
  const runs=directTextRuns(p);
  let d=runs.find(r=>runIsBold(r)===bold) || runs[0];
  if(!d) return null;
  d=d.cloneNode(true);
  const rPr=[...d.children].find(c=>c.localName==='rPr');
  if(rPr){
    const hasB=[...rPr.children].some(c=>c.localName==='b');
    if(bold && !hasB){ rPr.appendChild(d.ownerDocument.createElementNS(WNS,'w:b')); rPr.appendChild(d.ownerDocument.createElementNS(WNS,'w:bCs')); }
    if(!bold && hasB){ [...rPr.children].filter(c=>c.localName==='b'||c.localName==='bCs').forEach(c=>c.remove()); }
  }
  return d;
}
/* إعادة بناء فقرة: نحافظ على تنسيقها (pPr) ونبدل محتواها بنصوصنا */
function rebuildPara(p, parts){
  const donB=donorRun(p,true), donP=donorRun(p,false);
  [...p.children].forEach(ch=>{ if(ch.localName!=='pPr') ch.remove(); });
  parts.forEach(pt=>{
    const don=(pt.bold? (donB||donP) : (donP||donB));
    if(!don) return;
    const r=don.cloneNode(true);
    setRunText(r, pt.text);
    p.appendChild(r);
  });
}
/* نسخ محاذاة/تنسيق فقرة من فقرة ثانية (عشان العنوان يصير بمحاذاة المحكوم عليه) */
function setParaProps(p, src){
  if(!p||!src) return;
  const srcPr=[...src.children].find(c=>c.localName==='pPr');
  if(!srcPr) return;
  const cl=srcPr.cloneNode(true);
  const old=[...p.children].find(c=>c.localName==='pPr');
  if(old) p.replaceChild(cl,old); else p.insertBefore(cl,p.firstChild);
}
function tableOf(doc, headerText){
  const tbls=[...doc.getElementsByTagNameNS(WNS,'tbl')];
  return tbls.find(tb=>elText(tb).includes(headerText))||null;
}
function fillTable(tbl, rowsData){
  const rows=[...tbl.children].filter(ch=>ch.localName==='tr');
  const dataRows=rows.slice(1);
  const skel=dataRows[0].cloneNode(true);
  dataRows.forEach(r=>r.remove());
  rowsData.forEach(vals=>{
    const row=skel.cloneNode(true);
    const cells=[...row.children].filter(ch=>ch.localName==='tc');
    vals.forEach((v,i)=>{
      if(!cells[i]) return;
      const cp=cells[i].getElementsByTagNameNS(WNS,'p')[0];
      if(cp) rebuildPara(cp,[{bold:false,text:String(v)}]);
    });
    tbl.appendChild(row);
  });
}
function debtorLine(d,i){ return ' '+d.name+'، '+holder(d)+' ('+d.id+').'; }
function addrLineText(d){ return (d.addr||'................')+(d.phone? '، هاتف رقم ('+d.phone+')':'')+'.'; }

/* ---------- تركيب جمل المبلغ (نفس صياغة المكتب) ---------- */
function chkMablagh(r){
  const curr=r.curr||'شيكل', n=r.rows.length;
  const total=r.rows.reduce((a,x)=>a+numVal(x.amount),0);
  const words=r.totalWords||tafqitCurr(total,curr);
  const chkW=n>1? 'الشيكات عدد ('+n+') المحررة لأمر الشركة والواردة تفاصيلها' : 'الشيك عدد (1) المحرر لأمر الشركة والوارد تفاصيله';
  return 'مبلغ ('+fmtNum(total)+') '+words+' بموجب '+chkW+' في الجدول المبين أدناه:';
}
function kmbMablagh(r){
  const curr=r.curr||'شيكل', n=Math.max(r.rows.length,1);
  const claimed=numVal(r.claimed), orig=numVal(r.orig);
  const cw=r.claimedWords||tafqitCurr(claimed,curr), ow=r.origWords||tafqitCurr(orig,curr);
  const kmbW=n>1? 'الكمبيالات عدد ('+n+') المحررة لأمر الشركة والواردة تفاصيلها' : 'الكمبيالة عدد (1) المحررة لأمر الشركة والواردة تفاصيلها';
  if(orig && orig!==claimed)
    return 'مبلغ ('+fmtNum(claimed)+') '+cw+'، وذلك من أصل الكمبيالة البالغ قيمتها ('+fmtNum(orig)+') '+ow+'، وذلك بموجب '+kmbW+' في الجدول المبين أدناه:';
  return 'مبلغ ('+fmtNum(claimed)+') '+cw+'، وذلك بموجب '+kmbW+' في الجدول المبين أدناه:';
}

  if(pTalab){

/* ---------- التوليد والتنزيل ---------- */
async function genDocx(kind, r){
  const key= kind+'_'+(r.type==='chk'?'chk':'kmb');
  const src=TPL[key];
  let data;
  if(src.startsWith('URL:')){
    const resp=await fetch(src.slice(4));
    if(!resp.ok) throw new Error('تعذر تحميل القالب من الموقع');
    data=await resp.arrayBuffer();
  } else data=b64ToU8(src);
  const zip=await JSZip.loadAsync(data);
  const xml=await zip.file('word/document.xml').async('string');
  const doc=new DOMParser().parseFromString(xml,'application/xml');
  if(key==='mahdar_chk') recipeMahdarChk(doc,r);
  else if(key==='mahdar_kmb') recipeMahdarKmb(doc,r);
  else if(key==='wakala_chk') recipeWakalaChk(doc,r);
  else recipeWakalaKmb(doc,r);
  let out=new XMLSerializer().serializeToString(doc);
  if(!out.startsWith('<?xml')) out='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\r\n'+out;
  zip.file('word/document.xml', out);
  return zip.generateAsync({type:'blob', compression:'DEFLATE', compressionOptions:{level:6}, mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
}
function saveBlob(blob, filename){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),3000);
}
async function dlMahdar(id){
  const r=rec(id);
  if(r.type==='hkm'){ downloadDoc(`محضر تنفيذ - ${r.debtors[0]?.name||''}.doc`, buildMahdar(r)); toast('⬇️ نزل المحضر (تنفيذ الأحكام لسا بدون قالب أصلي)'); return; }
  if(!window.JSZip){ toast('⚠️ لازم إنترنت أول مرة — أعد تحميل الصفحة'); return; }
  try{
    const blob=await genDocx('mahdar', r);
    saveBlob(blob, `محضر تنفيذ - ${r.debtors[0]?.name||''}.docx`);
    toast('⬇️ نزل المحضر بقالب المكتب الأصلي');
  }catch(e){ console.error(e); toast('⚠️ صار خطأ بالتوليد: '+e.message); }
}
async function dlWakala(id){
  const r=rec(id);

function refreshTotals(){
  const curr=draft.curr||'شيكل';

    const sp=document.getElementById('totalSpan'); if(sp) sp.textContent=fmtNum(total)+' '+curr;
    draft.totalWords=tafqitCurr(total,curr);
    const w=document.getElementById('f_totalWords'); if(w) w.value=draft.totalWords;
  } else {
    const c=numVal(draft.claimed);
    draft.claimedWords=c? tafqitCurr(c,curr):'';
    const w=document.getElementById('f_claimedWords'); if(w) w.value=draft.claimedWords;
    if(draft.type==='kmb'){
      const o=numVal(draft.orig);
      draft.origWords=o? tafqitCurr(o,curr):'';
      const w2=document.getElementById('f_origWords'); if(w2) w2.value=draft.origWords;
    }
  }
}
function saveForm(){
  draft.court2=document.getElementById('f_court2').value.trim();
  draft.companyId=document.getElementById('f_company').value;
  if(!draft.debtors.some(d=>d.name.trim())){ toast('⚠️ اكتب اسم المحكوم عليه'); return; }
  draft.debtors=draft.debtors.filter(d=>d.name.trim());
  if(draft.type==='chk') draft.rows=draft.rows.filter(x=>x.no||x.amount);
  if(draft.type==='kmb'){
    draft.rows=draft.rows.filter(x=>x.amount);
    if(!draft.rows.length && numVal(draft.claimed)) draft.rows=[{amount:draft.claimed,writeDate:'',due:''}];
  }
  if(!draft.id){ draft.id=uid(); db.records.push(draft); }
  else{ const i=db.records.findIndex(x=>x.id===draft.id); db.records[i]=draft; }
  save(); toast('✅ انحفظت المعاملة');
  stack=[{page:'home'},{page:'mahader'},{page:'list',type:draft.type}];
  view={page:'record',id:draft.id}; render(); window.scrollTo(0,0);
}

function saveCompany(editId){
  const g=id=>document.getElementById(id).value.trim();
  if(!g('c_name')){ toast('⚠️ اكتب اسم الشركة'); return; }
  const data={name:g('c_name'),reg:g('c_reg'),address:g('c_address'),wakilName:g('c_wakil'),wakalaNo:g('c_wno'),notary:g('c_notary'),wakalaDate:g('c_wdate'),lawyers:g('c_lawyers')};
  if(editId) Object.assign(db.companies.find(x=>x.id===editId),data);
  else db.companies.push(Object.assign({id:uid()},data));
  save(); toast('✅ انحفظت'); back();
}
function delCompany(id){
  if(!confirm('حذف الشركة؟')) return;
  db.companies=db.companies.filter(x=>x.id!==id); save(); view={page:'companies'}; render();
}

/* ==================== الإعدادات ==================== */
function vSettings(){
  return crumbs('⚙️ الإعدادات')+`
  <div class="card-box">
    <label>اسم وكيل المحكوم لها (ينحط بالمحضر بعد "حضر وكيل المحكوم لها:" — اتركه فاضي إذا بتعبيه بخط اليد)</label>
    <input id="s_lawyer" value="${esc(db.settings.lawyer||'')}" placeholder="المحامي ...">
  </div>
  <button class="btn" onclick="db.settings.lawyer=document.getElementById('s_lawyer').value.trim();save();toast('✅ انحفظت');back()">💾 حفظ</button>`;
}

/* ==================== نسخ احتياطي ==================== */
function exportDb(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='قسم-التنفيذ-نسخة-'+today()+'.json';
  a.click(); toast('⬇️ نزلت النسخة الاحتياطية');
}
function importDb(inp){
  const file=inp.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d.records) throw 0; db=d; save(); render(); toast('✅ رجعت البيانات'); }catch(e){ toast('⚠️ الملف مش صالح'); } };
  r.readAsText(file); inp.value='';
}

/* ==================== تشغيل ==================== */
const _origRender=render;
render=function(){ _origRender(); if(view.page==='form'){ renderDebtors(); renderRows(); refreshTotals(); } };
render();
</script>
